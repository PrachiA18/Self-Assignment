<!DOCTYPE html>
<head>
    <script src="https://code.jquery.com/jquery-4.0.0.js"></script>
    <script>
        $ (document).ready(function(){
         $("#b1").click(function(){
        $("#p1").text("Hello")
        $("#p2").text("Hello")
         $("#p2").css("font-style", "italic")
        $("#p3").text("Hello")
         $("#p3").css("text-decoration", "underline")
         })   
         
        })
    </script>

</head>
<body>
    <p id="p1"></p>
    <p id="p2"></p>
    <p id="p3"></p>
    <button id="b1">OK</button>
</body>
</html>
